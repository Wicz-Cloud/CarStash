name: CarStash CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint & style
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint deps
        run: pip install flake8 black isort

      - name: flake8 (style + errors)
        run: |
          flake8 server/ client/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__

      - name: black (formatting check)
        run: black --check --line-length 120 server/ client/

      - name: isort (import order)
        run: isort --check-only --profile black server/ client/

  # ──────────────────────────────────────────────
  # 2. Security scan
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit safety

      - name: bandit (static security analysis)
        run: |
          bandit -r server/ client/ \
            -ll \
            --exclude tests/ \
            -f json -o bandit-report.json || true
          bandit -r server/ client/ -ll --exclude tests/

      - name: safety (known CVE check on dependencies)
        run: safety check -r requirements.txt --full-report
        continue-on-error: true   # advisory — won't block PR

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ──────────────────────────────────────────────
  # 3. Unit tests
  # ──────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run tests with coverage
        env:
          # Provide safe dummy values so imports don't blow up
          PI_IP: "192.168.1.99"
          SECRET_KEY: "test-secret"
          CARSTASH_MEDIA_SERVER: "none"
        run: |
          pytest tests/ \
            --cov=server \
            --cov=client \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # Optional: push to Codecov if you add CODECOV_TOKEN to repo secrets
      - name: Upload to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ──────────────────────────────────────────────
  # 4. Integration smoke test
  #    Spins up the Flask server and hits /health
  # ──────────────────────────────────────────────
  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: test   # only run if unit tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start server in background
        env:
          PI_IP: "192.168.1.99"
          SECRET_KEY: "ci-smoke-key"
          FLASK_ENV: testing
          CARSTASH_LOG_DIR: ${{ runner.temp }}/carstash/logs
          CARSTASH_MEDIA_DIR: ${{ runner.temp }}/carstash/media
        run: |
          mkdir -p "$CARSTASH_LOG_DIR" "$CARSTASH_MEDIA_DIR"
          cd server
          python app.py > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          # Give Flask extra time to bind
          sleep 12

          
      - name: Health check — server responds
        run: |
          curl --fail --retry 5 --retry-delay 2 http://localhost:5000/health \
            || (echo "Server did not respond" && exit 1)
      
      - name: Output server log if health check fails
        if: failure()
        run: cat /tmp/server.log

      - name: Shutdown server
        if: always()
        run: |
          kill $(cat /tmp/server.pid) 2>/dev/null || true

  # ──────────────────────────────────────────────
  # 5. Build gate — final status check
  # ──────────────────────────────────────────────
  build-gate:
    name: Build Gate
    runs-on: ubuntu-latest
    needs: [lint, security, test, integration]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.integration.result }}" != "success" ]]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed ✅"
